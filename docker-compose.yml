version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: m3-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
    networks:
      - m3-network

  frontend:
  build:
    context: ./frontend
  depends_on:
    - backend
  ports:
    - "3000:3000"
  environment:
    NEXT_PUBLIC_API_URL: http://backend:8080
    networks:
      - m3-network

networks:
  m3-network:
    driver: bridge
